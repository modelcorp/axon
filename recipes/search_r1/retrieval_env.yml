name: retrieval_server
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy<2.0.0
  - pytorch>=2.0.0
  - pytorch-cuda=11.8
  - faiss-gpu>=1.7.4
  - pip
  - pip:
    - pyserini>=0.36.0
    - datasets>=2.14.0
    - fastapi>=0.109.0
    - uvicorn>=0.27.0
    - pydantic>=2.0.0
    - requests>=2.31.0
    - transformers>=4.30.0

