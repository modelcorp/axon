name: Security Checks

on:
  pull_request:
  push:
    branches:
      - main
      - v0.*

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Bandit (static security analysis)
        run: |
          bandit -r axon \
            -x "checkpoints,outputs,logs,data,tests,axon/utils/rewards/code_utils" \
            -ll

      - name: pip-audit (dependency vulnerability scan)
        run: |
          set -euo pipefail
          # Ignored advisories (no upstream fix available, or out of scope for the default install):
          #  - CVE-2024-3924 / CVE-2026-0994: text-generation, transitive via browsergym/web-arena tooling.
          #  - PYSEC-2026-139 / CVE-2025-3000: torch (2.10 base / 2.12 mcore) — no patched release exists;
          #    the version is pinned for the CUDA 12.8 build, so it cannot be remediated by upgrading.
          PIP_AUDIT_IGNORE=(
            --ignore-vuln CVE-2024-3924
            --ignore-vuln CVE-2026-0994
            --ignore-vuln PYSEC-2026-139
            --ignore-vuln CVE-2025-3000
          )
          base_requirements=(
            install/dependencies/requirements-base.txt
            install/dependencies/requirements-dev.txt
            install/dependencies/requirements-docs.txt
          )
          base_args=()
          for req in "${base_requirements[@]}"; do
            base_args+=(-r "${req}")
          done
          # Base dependencies must resolve together.
          pip-audit "${base_args[@]}" --progress-spinner off "${PIP_AUDIT_IGNORE[@]}"

          # vLLM is the default backend; audit it together with the base set (blocking).
          vllm_args=("${base_args[@]}" -r install/dependencies/requirements-vllm.txt)
          pip-audit "${vllm_args[@]}" --progress-spinner off "${PIP_AUDIT_IGNORE[@]}"

          # SGLang is an optional, non-default backend (vLLM is the default). Its requirements
          # cannot co-resolve with the base set (conflicting openai pin), so it is audited
          # standalone, and advisory-only: it surfaces upstream CVEs in optional transitive deps
          # (diffusers/pillow) without blocking the default-install security gate.
          pip-audit -r install/dependencies/requirements-sglang.txt --progress-spinner off "${PIP_AUDIT_IGNORE[@]}" \
            || echo "::warning::pip-audit found advisories in optional SGLang backend deps (non-blocking)"

          # Megatron-core is an optional extra and is audited separately (blocking).
          pip-audit -r install/dependencies/requirements-mcore.txt --progress-spinner off "${PIP_AUDIT_IGNORE[@]}"
